networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.90.0/24

services:
  db:
    image: docker.m.daocloud.io/library/postgres:15
    container_name: interview-tiger-db
    networks:
      app_network:
        ipv4_address: 172.30.90.20
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: interview_tiger
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-tiger-backend
    networks:
      app_network:
        ipv4_address: 172.30.90.10
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://postgres:password@db:5432/interview_tiger
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local