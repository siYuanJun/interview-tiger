# 面试虎 - Docker Compose（本地开发）
# 原则2：compose 全权管理生命周期
# 原则4：桥接网络 + 静态 IP
# 原则6：国产镜像源

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.90.0/24

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-tiger-backend
    networks:
      app_network:
        ipv4_address: 172.20.90.10
    # 本地开发端口映射：Mac 宿主机通过 localhost:8000 访问
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
