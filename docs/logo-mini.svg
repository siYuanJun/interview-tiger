<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </radialGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="tigerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="256" height="256" fill="url(#bgRadial)"/>
  
  <circle cx="128" cy="128" r="100" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.1"/>
  
  <circle cx="128" cy="128" r="50" fill="rgba(30,27,75,0.8)" stroke="url(#tigerGradient)" stroke-width="2" filter="url(#glow)"/>
  
  <g transform="translate(128, 128)">
    <ellipse cx="-12" cy="-6" rx="7" ry="8" fill="url(#tigerGradient)" opacity="0.9"/>
    <ellipse cx="12" cy="-6" rx="7" ry="8" fill="url(#tigerGradient)" opacity="0.9"/>
    
    <ellipse cx="-12" cy="-6" rx="4" ry="5" fill="#fff" opacity="0.8"/>
    <ellipse cx="12" cy="-6" rx="4" ry="5" fill="#fff" opacity="0.8"/>
    <circle cx="-10" cy="-6" r="2" fill="#0f0f23"/>
    <circle cx="14" cy="-6" r="2" fill="#0f0f23"/>
    
    <path d="M -8 5 L 0 13 L 8 5" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="-16" cy="3" r="2" fill="#fbbf24" opacity="0.7"/>
    <circle cx="16" cy="3" r="2" fill="#fbbf24" opacity="0.7"/>
    
    <ellipse cx="0" cy="17" rx="5" ry="4" fill="#fbbf24" opacity="0.6"/>
  </g>
  
  <g transform="translate(128, 85)">
    <path d="M 0 0 Q 8 -15 16 0 Q 8 15 0 0" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="d" values="M 0 0 Q 8 -15 16 0 Q 8 15 0 0;M 0 0 Q 8 -22 16 0 Q 8 22 0 0;M 0 0 Q 8 -15 16 0 Q 8 15 0 0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 0 Q 14 -10 28 0 Q 14 10 0 0" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.4">
      <animate attributeName="d" values="M 0 0 Q 14 -10 28 0 Q 14 10 0 0;M 0 0 Q 14 -18 28 0 Q 14 18 0 0;M 0 0 Q 14 -10 28 0 Q 14 10 0 0" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g transform="translate(128, 170)">
    <path d="M 0 0 Q -8 -15 -16 0 Q -8 15 0 0" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="d" values="M 0 0 Q -8 -15 -16 0 Q -8 15 0 0;M 0 0 Q -8 -22 -16 0 Q -8 22 0 0;M 0 0 Q -8 -15 -16 0 Q -8 15 0 0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 0 Q -14 -10 -28 0 Q -14 10 0 0" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.4">
      <animate attributeName="d" values="M 0 0 Q -14 -10 -28 0 Q -14 10 0 0;M 0 0 Q -14 -18 -28 0 Q -14 18 0 0;M 0 0 Q -14 -10 -28 0 Q -14 10 0 0" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <text x="128" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    面试虎
  </text>
  <text x="128" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle" letter-spacing="1">
    INTERVIEW TIGER
  </text>
</svg>
