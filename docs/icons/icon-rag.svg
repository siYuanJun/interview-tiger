<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="128" height="128" fill="#0f0f23"/>
  
  <rect x="16" y="16" width="96" height="96" rx="20" fill="rgba(6,182,212,0.15)" stroke="url(#gradient)" stroke-width="2" filter="url(#glow)"/>
  
  <g transform="translate(64, 64)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#06b6d4"/>
    
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="-21" y1="-21" x2="21" y2="21" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="21" y1="-21" x2="-21" y2="21" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    
    <path d="M 30 0 A 30 30 0 0 1 0 30" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
    </path>
    
    <circle cx="30" cy="0" r="4" fill="#22d3ee">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="-25" cy="-20" r="3" fill="#67e8f9">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="-15" r="3" fill="#67e8f9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="25" r="3" fill="#67e8f9">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="20" r="3" fill="#67e8f9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <text x="64" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">
    RAG 检索
  </text>
</svg>
