<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="128" height="128" fill="#0f0f23"/>
  
  <rect x="16" y="16" width="96" height="96" rx="20" fill="rgba(139,92,246,0.15)" stroke="url(#gradient)" stroke-width="2" filter="url(#glow)"/>
  
  <g transform="translate(64, 64)">
    <path d="M -35 25 L 0 -35 L 35 25 Z" fill="#8b5cf6"/>
    <path d="M -28 18 L 0 -25 L 28 18" stroke="#fff" stroke-width="2" fill="none"/>
    
    <circle cx="25" cy="-10" r="4" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-20" cy="15" r="3" fill="#c4b5fd">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="20" r="3" fill="#ddd6fe">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" cy="-5" r="3" fill="#a78bfa">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <line x1="0" y1="-25" x2="25" y2="-10" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-25" x2="-30" y2="-5" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="18" x2="-20" y2="15" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="18" x2="30" y2="20" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
  </g>
  
  <text x="64" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">
    知识库
  </text>
</svg>
