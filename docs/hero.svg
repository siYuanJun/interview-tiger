<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="960" height="320" fill="url(#bgGradient)"/>
  
  <circle cx="100" cy="280" r="60" fill="#818cf8" opacity="0.1"/>
  <circle cx="860" cy="40" r="80" fill="#c084fc" opacity="0.1"/>
  <circle cx="480" cy="160" r="120" fill="#f472b6" opacity="0.05"/>
  
  <path d="M 50 200 Q 150 100 250 180 T 450 160" stroke="#818cf8" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  <path d="M 510 180 Q 610 80 710 160 T 910 140" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="5,5"/>
  
  <circle cx="80" cy="200" r="3" fill="#818cf8"/>
  <circle cx="120" cy="160" r="2" fill="#c084fc"/>
  <circle cx="160" cy="220" r="2" fill="#f472b6"/>
  <circle cx="200" cy="180" r="3" fill="#818cf8"/>
  <circle cx="760" cy="200" r="3" fill="#c084fc"/>
  <circle cx="800" cy="160" r="2" fill="#f472b6"/>
  <circle cx="840" cy="220" r="2" fill="#818cf8"/>
  <circle cx="880" cy="180" r="3" fill="#c084fc"/>
  
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#312e81" stroke="url(#accentGradient)" stroke-width="2"/>
    <rect x="20" y="20" width="80" height="80" rx="15" fill="#1e1b4b"/>
    <path d="M 35 60 L 50 80 L 85 35" stroke="#fbbf24" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="60" cy="60" r="8" fill="#fbbf24" filter="url(#glow)"/>
  </g>
  
  <g transform="translate(260, 90)">
    <rect x="0" y="0" width="60" height="60" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="12" y="12" width="36" height="36" rx="6" fill="#818cf8" opacity="0.2"/>
    <path d="M 20 30 L 30 40 L 40 20" stroke="#818cf8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g transform="translate(360, 100)">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="#312e81" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="15" fill="#c084fc" opacity="0.2"/>
    <circle cx="25" cy="25" r="8" fill="#c084fc"/>
  </g>
  
  <g transform="translate(450, 90)">
    <rect x="0" y="0" width="55" height="55" rx="11" fill="#312e81" stroke="#f472b6" stroke-width="1.5"/>
    <path d="M 15 27.5 L 27.5 40 L 40 15" stroke="#f472b6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g transform="translate(540, 100)">
    <rect x="0" y="0" width="50" height="50" rx="10" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
    <rect x="10" y="15" width="30" height="8" rx="2" fill="#818cf8"/>
    <rect x="10" y="27" width="20" height="8" rx="2" fill="#818cf8" opacity="0.6"/>
    <rect x="10" y="39" width="25" height="8" rx="2" fill="#818cf8" opacity="0.4"/>
  </g>
  
  <text x="260" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#textGlow)">
    面试虎
  </text>
  <text x="410" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="url(#accentGradient)" filter="url(#textGlow)">
    Interview Tiger
  </text>
  
  <text x="260" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a5b4fc" letter-spacing="1">
    实时语音识别 · 双知识库支持 · 个性化回答建议
  </text>
  
  <g transform="translate(260, 250)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="70" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#ffffff" text-anchor="middle">
      开始面试
    </text>
  </g>
  
  <g transform="translate(420, 250)">
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#312e81" stroke="url(#accentGradient)" stroke-width="1"/>
    <text x="70" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">
      查看文档
    </text>
  </g>
</svg>