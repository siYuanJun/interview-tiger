      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="960" height="300" fill="url(#bgGradient)"/>
  
  <circle cx="80" cy="260" r="60" fill="#60a5fa" opacity="0.08"/>
  <circle cx="880" cy="40" r="80" fill="#c084fc" opacity="0.08"/>
