      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="960" height="360" fill="url(#bgGradient)"/>
  
  <circle cx="80" cy="300" r="80" fill="#60a5fa" opacity="0.08"/>
  <circle cx="880" cy="60" r="100" fill="#c084fc" opacity="0.08"/>
  <circle cx="480" cy="180" r="150" fill="#f472b6" opacity="0.03"/>
  
  <path d="M 40 220 Q 140 80 240 200 T 440 180" stroke="#60a5fa" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="6,4"/>
  <path d="M 520 200 Q 620 60 720 180 T 920 160" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="6,4"/>
  
  <circle cx="60" cy="240" r="4" fill="#60a5fa"/>
